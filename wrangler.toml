# Cloudflare Pages configuration for orchestack.africa.
#
# The Cloudflare "Create a Worker" UI actually runs a Pages deployment
# under the hood when the build produces a static-file output directory
# instead of a JavaScript entrypoint. Pages requires this file to
# declare `pages_build_output_dir` — pointing at the directory
# scripts/build-site.sh produces — rather than the Worker-style
# [assets] block. Documented at:
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# Build + deploy flow:
#   1. Build command:  bash scripts/build-site.sh
#   2. Cloudflare Pages reads THIS file, sees pages_build_output_dir,
#      and uploads _site/ to its edge network.
#
# Custom domain (orchestack.africa) is attached via the Pages project's
# "Custom Domains" tab in the Cloudflare dashboard after first deploy —
# NOT configured in this file.

name = "orchestack"
compatibility_date = "2025-01-01"

# Directory produced by scripts/build-site.sh. Contains:
#   _site/index.html            — marketing landing (front-facing/index.html)
#   _site/services.html         — services list
#   _site/contact.html          — contact page
#   _site/install.sh            — operator install script (curl-safe)
#   _site/docs/*.html           — operator documentation (28 pages)
#   _site/docs/services/*.html  — per-service pages
#   _site/docs/guides/*.html    — operator guides
#   _site/assets/*              — shared CSS + images
pages_build_output_dir = "./_site"
