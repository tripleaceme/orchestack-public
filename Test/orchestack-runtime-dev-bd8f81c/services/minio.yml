# MinIO — S3-compatible object store (hot-tier).
#
# Stays running so Airbyte can write raw landings + dbt can read them
# without a cold-start delay. Console is served at /app/minio via
# Traefik; the S3 API on port 9000 is reachable inside the docker
# network as orchestack-minio:9000.

services:
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: orchestack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
      # MinIO console URL — used by MinIO for the post-login redirect
      # and for the WebSocket origin check. Set to the direct-port URL
      # since the subpath approach (see below) has known incompatibilities
      # with MinIO 2024+ — the SPA loads but its internal navigation
      # and WebSocket connection silently fail because some of MinIO's
      # frontend code assumes its API is at /api/v1, not at
      # /app/minio/api/v1. The Traefik labels below are still present
      # as a fallback for operators with locked-down firewalls who
      # can't bind localhost:9001 — they get a degraded but functional
      # UI; direct-port operators get the full experience.
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio-data:/data
    ports:
      # Expose the console on host:9001 — this is the SUPPORTED MinIO
      # deployment pattern for browser access. The dashboard's Open
      # button points operators here instead of /app/minio. The S3
      # API on 9000 stays internal to the docker network (Airbyte +
      # dbt reach it as orchestack-minio:9000 — no need to expose).
      - "9001:9001"
    networks:
      - orchestack-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    labels:
      - orchestack.service=minio
      - orchestack.tier=hot
      - traefik.enable=true
      # Console UI (port 9001) under /app/minio
      - traefik.http.routers.minio.rule=PathPrefix(`/app/minio`)
      - traefik.http.routers.minio.entrypoints=web
      - traefik.http.routers.minio.priority=200
      - traefik.http.middlewares.minio-strip.stripprefix.prefixes=/app/minio
      - traefik.http.routers.minio.middlewares=minio-strip@docker
      - traefik.http.services.minio.loadbalancer.server.port=9001

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  minio-data:
    name: orchestack-minio-data
