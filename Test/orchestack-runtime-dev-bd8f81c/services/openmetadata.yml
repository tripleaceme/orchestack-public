# OpenMetadata — governance + observability (cold-tier).
#
# Uses its own `openmetadata` database (NOT a schema in services). Same
# constraint as Metabase: OpenMetadata's Flyway migrations write to
# `public.<tablename>` with no honorable schema setting. Tested against
# the schema-aware contract; failed; per-DB is the architecturally
# honest choice.
#
# OpenMetadata's deployment also requires Elasticsearch (for full-text
# search) and an Airflow-side ingestion runner. For M4.6 we ship the
# OpenMetadata server alone with embedded Elasticsearch via the
# openmetadata-server distribution. ES-as-sidecar in M5+.

services:
  # Single openmetadata/server:1.6.5 container that runs migrations
  # before starting the server in the same process tree.
  #
  # Why this shape (instead of the upstream-recommended two-container
  # init-runner + server split): on a single-tenant install the split
  # leaves a "stopped" migrate container sitting in Docker forever
  # after exiting 0, which is visually confusing — operators see two
  # openmetadata containers and assume one is duplicate/broken. The
  # combined `command:` runs migrate first (Flyway is idempotent —
  # detects "no new migrations" in ~5s on warm starts) then exec's the
  # server. Behaviour-equivalent to the split, one less container in
  # `docker ps`.
  #
  # Multi-replica deployments would need to revert to the split so
  # only one replica migrates — that's an M5+ concern when we get to
  # the cluster mode.
  openmetadata:
    image: docker.getcollate.io/openmetadata/server:1.6.5
    container_name: orchestack-openmetadata
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "[orchestack] running OpenMetadata DB migrations…"
        ./bootstrap/openmetadata-ops.sh migrate
        echo "[orchestack] starting OpenMetadata server…"
        exec /openmetadata-start.sh
    depends_on:
      openmetadata-es:
        condition: service_healthy
    environment:
      # Database — uses the openmetadata_admin role + openmetadata_db
      # database that the orchestrator's _ensure_openmetadata_setup hook
      # provisions on first start. User defaults match the convention
      # but can be overridden via OPENMETADATA_DB_USER in .env.
      DB_USER:     ${OPENMETADATA_DB_USER:-openmetadata_admin}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-}
      DB_HOST:     orchestack-postgres
      DB_PORT:     "5432"
      OM_DATABASE: openmetadata_db
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME:   postgresql
      # Auth — JWT + basic
      AUTHENTICATION_PROVIDER:   basic
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      JWT_TOKEN_SECRET_KEY: ${OPENMETADATA_JWT_SECRET:?OPENMETADATA_JWT_SECRET must be set in .env}
      OM_ADMIN_EMAIL:       ${OPENMETADATA_ADMIN_EMAIL:?OPENMETADATA_ADMIN_EMAIL must be set in .env}
      OM_ADMIN_PASSWORD:    ${OPENMETADATA_ADMIN_PASSWORD:?OPENMETADATA_ADMIN_PASSWORD must be set in .env}
      # Search
      SEARCH_TYPE:   elasticsearch
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: "9200"
      # Pipeline service — points at the openmetadata-ingestion sidecar
      # below. Without this, OM defaults to http://localhost:8080 (its
      # own port 8080, which doesn't exist) and the Connections tab
      # fails with "Failed to connect to Airflow due to
      # java.net.ConnectException." Even though we ship orchestack-airflow
      # for the operator's DAGs, OM's Managed APIs plugin lives only in
      # the openmetadata/ingestion image — we can't reuse the main
      # Airflow without rebuilding that image with the plugin.
      PIPELINE_SERVICE_CLIENT_ENDPOINT:   http://orchestack-openmetadata-ingestion:8080
      PIPELINE_SERVICE_CLIENT_CLASS_NAME: org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient
      SERVER_HOST_API_URL_FOR_INGESTION:  http://orchestack-openmetadata:8585/api
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: no-ssl
      PIPELINE_SERVICE_IP_INFO_ENABLED:   "false"
      PIPELINE_SERVICE_CLIENT_AUTH_USER_NAME: admin
      PIPELINE_SERVICE_CLIENT_AUTH_PASSWORD:  admin
      # SERVER_HOST_API_URL is what OM EMBEDS in generated ingestion
      # DAGs as the URL the DAG should call back to. The DAG runs
      # inside orchestack-openmetadata-ingestion, where "localhost"
      # resolves to that ingestion container itself — NOT the OM
      # server. So the URL has to be the OM server's docker-network
      # hostname, not localhost.
      #
      # The SPA running in the operator's browser doesn't read this
      # value — the SPA makes RELATIVE /api/v1/* calls that resolve
      # against window.location (http://localhost:8585 when the
      # operator opens the tile). So we can safely use the
      # docker-network hostname here without breaking the browser UI.
      SERVER_HOST_API_URL: http://orchestack-openmetadata:8585/api
      WEB_CONF_URI:        http://orchestack-openmetadata:8585
    networks:
      - orchestack-net
    ports:
      # Direct host port so the React SPA's root-absolute paths resolve
      # cleanly. The dashboard's Open button routes to this URL via
      # catalogue's external_url. The Traefik labels below stay enabled
      # for completeness (so /app/openmetadata returns SOMETHING rather
      # than 404), but the operator's actual entry point is :8585.
      - "8585:8585"
    healthcheck:
      # OpenMetadata's base image ships with wget (not curl) and exposes
      # /healthcheck on the Dropwizard ADMIN port 8586 — NOT the API
      # port 8585. The previous curl+8585 check silently failed forever
      # (curl not in PATH; container reported "starting" until retries
      # exhausted then went unhealthy even though the server was fine).
      test: ["CMD-SHELL", "wget -qO- http://localhost:8586/healthcheck | grep -q '\"healthy\":true' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 18
      start_period: 120s
    labels:
      - orchestack.service=openmetadata
      - orchestack.tier=cold
      - traefik.enable=true
      - traefik.http.routers.openmetadata.rule=PathPrefix(`/app/openmetadata`)
      - traefik.http.routers.openmetadata.entrypoints=web
      - traefik.http.routers.openmetadata.priority=200
      - traefik.http.middlewares.openmetadata-strip.stripprefix.prefixes=/app/openmetadata
      - traefik.http.routers.openmetadata.middlewares=openmetadata-strip@docker
      - traefik.http.services.openmetadata.loadbalancer.server.port=8585

  # Required sidecar for OpenMetadata's full-text search. Not exposed
  # outside the docker network; OpenMetadata is the only client.
  openmetadata-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: orchestack-openmetadata-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    networks:
      - orchestack-net
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data
    healthcheck:
      # ES isn't reachable on its API until cluster status is at least
      # yellow. Without this check, openmetadata-migrate's `depends_on:
      # service_started` returns true the moment the JVM is alive but
      # the index API still 503s — which is exactly the
      # `java.net.ConnectException: Connection refused` trace we saw
      # when migrate tried to update aliases on restart. Probe the
      # cluster-health endpoint with wait_for_status=yellow; it returns
      # 200 only when ES can actually serve queries.
      #
      # The ES 8.11.4 image has `curl` but NOT `wget` (unlike most other
      # base images we deal with) — using wget here returns 127 and the
      # container stays unhealthy forever.
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -qE '\"status\":\"(yellow|green)\"' || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 60s

  # OpenMetadata's ingestion sidecar — Airflow + OM Managed APIs plugin
  # bundled in one image. OM's Connections feature talks to this
  # container's /api endpoint to deploy + run metadata ingestion DAGs.
  #
  # Why separate from orchestack-airflow: the Managed APIs plugin is
  # baked into the openmetadata/ingestion image but NOT shipped with
  # apache/airflow. Adding it to our main Airflow would mean a custom
  # image build (same path we took for GE). For the academic ship, the
  # sidecar approach is simpler — operator gets a working OM with no
  # extra build step. Trade-off: ~600MB extra image + a second Airflow
  # to monitor. Worth it because OM without ingestion is functionally
  # crippled (catalogue works, but every Connections click errors).
  #
  # SQLite for the Airflow metadata DB — appropriate for the low-volume,
  # single-tenant ingestion workload. Persists to a named volume.
  openmetadata-ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:1.6.5
    container_name: orchestack-openmetadata-ingestion
    restart: unless-stopped
    # The image's default entrypoint forwards its CMD as args to the
    # `airflow` CLI — which errors on anything that isn't an airflow
    # subcommand. Bypass it: run the bundled ingestion_dependency.sh
    # (initializes the SQLite metadata DB, creates the admin user,
    # then exec's webserver + scheduler) via bash directly.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cd /opt/airflow && exec ./ingestion_dependency.sh
    depends_on:
      openmetadata:
        condition: service_healthy
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      # SequentialExecutor (not LocalExecutor) so SQLite works — Airflow
      # rejects SQLite+LocalExecutor because workers can't share state
      # through a locked-file DB. SequentialExecutor runs tasks
      # one-at-a-time in a single process. For OM's low-volume metadata
      # ingestion (a handful of DAGs per service connection, run on
      # operator demand) that's fine. Switch to LocalExecutor + Postgres
      # if/when an operator brings high-frequency ingestion online.
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_RUNNER_TEMPLATE: /opt/airflow/dag_templates/airflow_dag_scheduled_workflow_template.py.template
      # First-boot admin login for the ingestion's Airflow UI. Rarely
      # accessed directly — operators use OM's Connections UI which
      # goes through the Managed APIs. Default creds here match what
      # OM server uses to call the Managed APIs (PIPELINE_SERVICE_CLIENT_AUTH_*).
      AIRFLOW_DB_MIGRATE: "true"
      AIRFLOW_WWW_USER_CREATE: "true"
      AIRFLOW_WWW_USER_USERNAME: admin
      AIRFLOW_WWW_USER_PASSWORD: admin
    networks:
      - orchestack-net
    volumes:
      - openmetadata-ingestion-dags:/opt/airflow/dags
      - openmetadata-ingestion-data:/opt/airflow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 18
      start_period: 180s

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  openmetadata-es-data:
    name: orchestack-openmetadata-es-data
  openmetadata-ingestion-dags:
    name: orchestack-openmetadata-ingestion-dags
  openmetadata-ingestion-data:
    name: orchestack-openmetadata-ingestion-data
