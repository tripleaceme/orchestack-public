# Great Expectations — data quality with embedded data docs + terminal (cold-tier).
#
# Uses the custom orchestack-ge image (see system/docker/ge-image/Dockerfile)
# that pre-installs:
#   - nano + vim-tiny + less + git + curl (apt)
#   - ttyd 1.7.7 web terminal
#   - great_expectations 0.18.21 + psycopg2-binary + sqlalchemy<2
#
# Pre-baking moves the ~30-60min first-start pip install cost from
# every operator's machine to a one-time CI build. Container start is
# now ~10s like every other service.
#
# Two operator-facing surfaces:
#   - Data Docs   on port 8003 (direct-port, GE docs SPA uses absolute
#                 asset paths). "Open Data Docs" button.
#   - ttyd shell  on /app/ge-terminal via Traefik subpath. "Open Terminal".

services:
  ge:
    image: tripleaceme/orchestack-ge:0.18.21-1
    container_name: orchestack-ge
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e

        # /gx is the path the GE 0.18 CLI auto-discovers and is the
        # conventional context-root path in upstream docs. The bundled
        # base image ships a blank context at /gx that the CLI prefers
        # over anything we write elsewhere — so we MUST write our
        # project at /gx for GE to pick it up. The volume mounts here.
        export GE_DATA_CONTEXT_ROOT_DIR=/gx

        # ── 1. Repo clone OR demo bootstrap ───────────────────────────
        # Mirrors the dbt service's repo-clone pattern: operators can
        # point GE_REPO_URL at their own great_expectations project; if
        # unset, we bootstrap a working demo against the warehouse so
        # data docs show real validation results out-of-the-box.
        # On first start (volume empty), wipe the base-image scaffold at
        # /gx so a real project can clone in OR the demo can write fresh.
        if [ -n "$$GE_REPO_URL" ]; then
          if [ -d "$$GE_DATA_CONTEXT_ROOT_DIR/.git" ]; then
            cd "$$GE_DATA_CONTEXT_ROOT_DIR" && git fetch && git reset --hard "origin/$${GE_REPO_BRANCH:-main}" || true
          else
            rm -rf "$$GE_DATA_CONTEXT_ROOT_DIR"/* "$$GE_DATA_CONTEXT_ROOT_DIR"/.[!.]* 2>/dev/null || true
            git clone -b "$${GE_REPO_BRANCH:-main}" "$$GE_REPO_URL" "$$GE_DATA_CONTEXT_ROOT_DIR" || \
              echo "[orchestack] git clone failed — will fall through to demo bootstrap"
          fi
        fi

        # Detect whether the existing /gx is the base-image scaffold
        # (empty expectations + checkpoints) vs a real project. If
        # scaffold, replace it with our demo. If a real project (operator
        # mounted one in or the previous demo persisted), leave it.
        if [ ! -f "$$GE_DATA_CONTEXT_ROOT_DIR/great_expectations.yml" ] || \
           ( [ -z "$$(ls -A "$$GE_DATA_CONTEXT_ROOT_DIR/expectations" 2>/dev/null)" ] && \
             [ -z "$$(ls -A "$$GE_DATA_CONTEXT_ROOT_DIR/checkpoints" 2>/dev/null)" ] ); then
          echo "[orchestack] bootstrapping demo Great Expectations project at /gx…"
          rm -rf "$$GE_DATA_CONTEXT_ROOT_DIR"/* "$$GE_DATA_CONTEXT_ROOT_DIR"/.[!.]* 2>/dev/null || true
          mkdir -p "$$GE_DATA_CONTEXT_ROOT_DIR"
          cd "$$GE_DATA_CONTEXT_ROOT_DIR"
          mkdir -p expectations checkpoints uncommitted/data_docs/local_site \
                   uncommitted/validations plugins
          cat > great_expectations.yml <<'GEYAML'
        config_version: 3.0
        datasources:
          warehouse:
            class_name: Datasource
            execution_engine:
              class_name: SqlAlchemyExecutionEngine
              connection_string: postgresql+psycopg2://$${GE_PG_USER}:$${GE_PG_PASSWORD}@$${GE_PG_HOST}:$${GE_PG_PORT}/$${GE_PG_DBNAME}
            data_connectors:
              default_runtime:
                class_name: RuntimeDataConnector
                batch_identifiers: [default_identifier_name]
              default_inferred:
                class_name: InferredAssetSqlDataConnector
                include_schema_name: true
        config_variables_file_path: uncommitted/config_variables.yml
        plugins_directory: plugins/
        stores:
          expectations_store:
            class_name: ExpectationsStore
            store_backend:
              class_name: TupleFilesystemStoreBackend
              base_directory: expectations/
          validations_store:
            class_name: ValidationsStore
            store_backend:
              class_name: TupleFilesystemStoreBackend
              base_directory: uncommitted/validations/
          evaluation_parameter_store:
            class_name: EvaluationParameterStore
          checkpoint_store:
            class_name: CheckpointStore
            store_backend:
              class_name: TupleFilesystemStoreBackend
              base_directory: checkpoints/
        expectations_store_name: expectations_store
        validations_store_name: validations_store
        evaluation_parameter_store_name: evaluation_parameter_store
        checkpoint_store_name: checkpoint_store
        data_docs_sites:
          local_site:
            class_name: SiteBuilder
            store_backend:
              class_name: TupleFilesystemStoreBackend
              base_directory: uncommitted/data_docs/local_site/
            site_index_builder:
              class_name: DefaultSiteIndexBuilder
        anonymous_usage_statistics:
          enabled: false
        GEYAML

          # Demo expectation suite — validates a query result from the
          # warehouse. Uses RuntimeDataConnector + an inline SQL query
          # (in the checkpoint below) so it works regardless of which
          # tables actually exist in the warehouse on first start.
          cat > expectations/demo_warehouse_tables.json <<'SUITE'
        {
          "data_asset_type": null,
          "expectation_suite_name": "demo_warehouse_tables",
          "expectations": [
            {
              "expectation_type": "expect_table_row_count_to_be_between",
              "kwargs": {"min_value": 1, "max_value": 100000},
              "meta": {"notes": "Demo: warehouse should have at least one table."}
            },
            {
              "expectation_type": "expect_column_values_to_not_be_null",
              "kwargs": {"column": "tablename"},
              "meta": {"notes": "Every table row must have a name."}
            },
            {
              "expectation_type": "expect_column_values_to_be_in_set",
              "kwargs": {"column": "schemaname",
                         "value_set": ["public","marts","raw","platform"],
                         "mostly": 0.5},
              "meta": {"notes": "Most warehouse schemas should match OrcheStack's known set."}
            }
          ],
          "meta": {
            "great_expectations_version": "0.18.21",
            "notes": "Demo suite generated by OrcheStack on first start. Replace by setting GE_REPO_URL."
          }
        }
        SUITE

          # Checkpoint: validates demo_warehouse_tables against an
          # inline SQL query result (RuntimeDataConnector pattern).
          # Avoids the InferredAssetSqlDataConnector asset-discovery
          # quirks for the bootstrap demo — any operator-authored
          # checkpoint can switch to InferredAssetSqlDataConnector for
          # their real tables once they have marts populated.
          cat > checkpoints/demo_checkpoint.yml <<'CHECKPOINT'
        name: demo_checkpoint
        config_version: 1.0
        template_name:
        module_name: great_expectations.checkpoint
        class_name: Checkpoint
        run_name_template: '%Y%m%d-%H%M%S-demo'
        expectation_suite_name: demo_warehouse_tables
        batch_request: {}
        action_list:
          - name: store_validation_result
            action:
              class_name: StoreValidationResultAction
          - name: update_data_docs
            action:
              class_name: UpdateDataDocsAction
              site_names: [local_site]
        evaluation_parameters: {}
        runtime_configuration: {}
        validations:
          - batch_request:
              datasource_name: warehouse
              data_connector_name: default_runtime
              data_asset_name: demo_warehouse_tables
              batch_identifiers:
                default_identifier_name: bootstrap_run
              runtime_parameters:
                query: |
                  SELECT schemaname, tablename, tableowner
                  FROM pg_catalog.pg_tables
                  WHERE schemaname NOT IN ('pg_catalog', 'information_schema')
                  LIMIT 1000
            expectation_suite_name: demo_warehouse_tables
        profilers: []
        ge_cloud_id:
        expectation_suite_ge_cloud_id:
        CHECKPOINT
        fi

        cd "$$GE_DATA_CONTEXT_ROOT_DIR"

        # ── 2. Run checkpoints + build data docs + serve ──────────────
        (
          # Pipe `yes` to bypass the [Y/n] confirmation prompt that GE
          # 0.18 still emits even with --no-view. --no-view only stops
          # the browser auto-open after build; the confirmation is
          # separate. Without `yes`, the build aborts and the data docs
          # site stays empty.
          echo "[orchestack] running checkpoints in $$PWD/checkpoints…"
          for cp_file in checkpoints/*.yml; do
            [ -f "$$cp_file" ] || continue
            cp_name="$$(basename "$$cp_file" .yml)"
            echo "[orchestack] → checkpoint: $$cp_name"
            yes | great_expectations checkpoint run "$$cp_name" 2>&1 | \
                sed "s/^/[ge ckpt:$$cp_name] /" || \
                echo "[orchestack] checkpoint $$cp_name failed (validation may have failed; docs will still build)"
          done

          echo "[orchestack] building data docs…"
          yes | great_expectations docs build --site-name local_site --no-view 2>&1 | \
              sed 's/^/[ge docs] /' || \
              echo "[orchestack] great_expectations docs build failed — site will be empty"

          DOCS_DIR="$$GE_DATA_CONTEXT_ROOT_DIR/uncommitted/data_docs/local_site"
          if [ ! -f "$$DOCS_DIR/index.html" ]; then
              mkdir -p "$$DOCS_DIR"
              echo "<html><body><h1>Great Expectations Data Docs</h1><p>Building… refresh in a moment.</p></body></html>" > "$$DOCS_DIR/index.html"
          fi
          cd "$$DOCS_DIR"
          echo "[orchestack] serving data docs on :8080 from $$DOCS_DIR"
          exec python -m http.server 8080 --bind 0.0.0.0
        ) &
        DOCS_PID=$$!

        # ── 3. ttyd web terminal ──────────────────────────────────────
        cat > /etc/profile.d/00-orchestack-welcome.sh <<'WELCOME'
        if [ -n "$PS1" ]; then
            export PS1='\[\e[36m\]ge@orchestack\[\e[0m\]:\[\e[33m\]\w\[\e[0m\]\$ '
            export PATH="/opt/ge-venv/bin:$PATH"
            export GE_DATA_CONTEXT_ROOT_DIR=/gx
            cd $GE_DATA_CONTEXT_ROOT_DIR 2>/dev/null || true
            echo
            echo -e "\e[1;36m── OrcheStack Great Expectations terminal ──\e[0m"
            echo "  Project dir : /gx (you are here)"
            echo "  Common cmds : great_expectations suite list"
            echo "                great_expectations suite edit <suite-name>"
            echo "                great_expectations checkpoint run <checkpoint-name>"
            echo "                great_expectations docs build"
            echo "  Editors     : nano / vim"
            echo "  Tip: like dbt, prefer GitHub web UI for production-bound"
            echo "       expectation changes (review + CI). Use this terminal"
            echo "       for diagnosing failing validations — re-run a"
            echo "       checkpoint against fresh data, inspect failed rows."
            echo
        fi
        WELCOME
        chmod +x /etc/profile.d/00-orchestack-welcome.sh

        echo "[orchestack] starting ttyd on :7681 (base-path /app/ge-terminal)"
        ttyd --writable \
             --port 7681 \
             --base-path /app/ge-terminal \
             -t titleFixed='Great Expectations CLI' \
             -t fontSize=14 \
             bash --login &
        TTYD_PID=$$!

        # ── 4. Wait for either to exit ────────────────────────────────
        wait -n $$DOCS_PID $$TTYD_PID

    environment:
      GE_PG_HOST:     orchestack-postgres
      GE_PG_PORT:     "5432"
      GE_PG_USER:     ${WAREHOUSE_DB_USER:-warehouse_admin}
      GE_PG_PASSWORD: ${WAREHOUSE_DB_PASSWORD:?WAREHOUSE_DB_PASSWORD must be set}
      GE_PG_DBNAME:   ${WAREHOUSE_DB_NAME:-data_warehouse}
      # Operator project (optional) — clone a great_expectations dir on
      # first start. Same shape as dbt's DBT_REPO_URL/_BRANCH pattern:
      # leave blank for the demo bootstrap, or paste a repo URL to use
      # your own suites + checkpoints.
      GE_REPO_URL:    ${GE_REPO_URL:-}
      GE_REPO_BRANCH: ${GE_REPO_BRANCH:-main}
    networks:
      - orchestack-net
    volumes:
      - ge-data:/gx
    ports:
      - "8003:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/index.html',timeout=3)\" || exit 1"
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 60s
    labels:
      - orchestack.service=ge
      - orchestack.tier=cold
      - traefik.enable=true
      - traefik.http.routers.ge-terminal.rule=PathPrefix(`/app/ge-terminal`)
      - traefik.http.routers.ge-terminal.entrypoints=web
      - traefik.http.routers.ge-terminal.priority=200
      - traefik.http.services.ge-terminal.loadbalancer.server.port=7681

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  ge-data:
    name: orchestack-ge-data
