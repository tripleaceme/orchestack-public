version: 2

sources:
  - name: demo_raw
    description: Synthetic raw tables used for OrcheStack maintainer verification.
    schema: raw
    tables:
      - name: demo_orders
        description: |
          Order-line records. Maintainer fixture seeds this from
          dbt seeds or a one-off SQL insert; not populated by Airbyte.
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_total
            tests: [not_null]
          - name: ordered_at

      - name: demo_customers
        description: Synthetic customer records.
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: customer_name
          - name: signup_at
