<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spinning up your stack — OrcheStack</title>
  <meta name="description" content="OrcheStack is pulling Docker images and starting services. This takes a few minutes on first install.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<main class="deploy-wrap">
  <div class="deploy-card">
    <a href="https://OrcheStack.africa" class="brand deploy-brand">
      <div class="brand-mark">O</div>
      <span>OrcheStack</span>
    </a>

    <h1 class="deploy-h1">Spinning up your data stack…</h1>
    <p class="deploy-status" id="status">Pulling Docker images…</p>

    <div class="spinner" aria-hidden="true"></div>

    <div class="progress-bar" aria-hidden="true">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <p class="muted" style="font-size:13.5px">
      First-time installs take 2–5 minutes.<br>
      You can leave this tab — we'll be ready when you come back.
    </p>

    <div class="joke-card">
      <div class="joke-label">While you wait</div>
      <p class="joke-text" id="joke">Why do Python developers wear glasses? Because they can't C#.</p>
    </div>
  </div>
</main>

<script>
  // ---------- Pull the user's actual service selections so the status messages
  // reference tools they picked, not generic ones. Falls back to a sensible
  // default stack if nothing is in storage. ----------
  const STORAGE_KEY = 'OrcheStack.setup';
  const DEFAULT_STACK = ["Airbyte", "PostgreSQL", "MinIO", "dbt Core",
                         "Great Expectations", "OpenMetadata", "Metabase", "pgAdmin"];
  function loadSelections() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return DEFAULT_STACK;
      const sel = JSON.parse(raw).selections || {};
      const picked = Object.values(sel).filter(v => v && v !== 'None');
      return picked.length ? picked : DEFAULT_STACK;
    } catch (e) { return DEFAULT_STACK; }
  }
  const STACK = loadSelections();

  // Build a status sequence from the actual selection. First we do the always-
  // present platform bootstrap steps, then one "Starting X…" line per service.
  const STATUSES = [
    "Writing docker-compose.yml with your service choices…",
    "Writing credentials to ./config/.env (chmod 600)…",
    "Creating PostgreSQL schemas (platform, raw, marts)…",
    ...STACK.map(svc => `Pulling and starting ${svc}…`),
    "Registering cold-tier services with the orchestrator…",
    "Running first-boot database migrations…",
    "Wiring up the Streamlit control plane…",
    "Almost there — running health checks…",
  ];

  // ---------- Jokes (rotate every few seconds, never repeat back-to-back) ----------
  const JOKES = [
    "Why do Python developers wear glasses? Because they can't C#.",
    "A SQL query walks into a bar, walks up to two tables, and asks: 'Can I join you?'",
    "There are 10 kinds of people in the world: those who understand binary, and those who don't.",
    "Why did the developer go broke? Because he used up all his cache.",
    "My dbt models are like my sourdough starter — they need constant feeding or everything dies.",
    "Debugging is like being the detective in a crime movie where you're also the murderer.",
    "Why did the analyst move to Lagos? For the joins.",
    "I had a problem so I thought I'd use regex. Now I have two problems.",
    "Why was the data engineer fired? He couldn't keep his tables clean.",
    "There are only two hard things in computer science: cache invalidation and naming things.",
    "Why did PostgreSQL break up with MongoDB? It said there was no schema in their relationship.",
    "Old data engineers never die. They just get re-indexed.",
    "What do you call a data engineer who doesn't document? Eventually unemployed.",
    "My dataset lied to me. I had trust issues with the outliers.",
    "Why don't data scientists trust stairs? They're always up to something.",
    "If it works, don't fix it — except if it's in production, then you have to fix it anyway.",
    "Why did the dashboard break up with the database? Too many joins, not enough relationship.",
    "A developer's favourite song: 'Nobody cache me like you cache me.'",
  ];

  // ---------- Timers ----------
  const TOTAL_MS = 18000;          // how long the simulated deploy takes (demo only)
  const STATUS_EVERY = 1500;       // rotate status every 1.5s
  const JOKE_EVERY = 4500;         // rotate joke every ~5s
  const REDIRECT_TO = "/app/";     // where we go when the deploy is "done"

  const statusEl = document.getElementById('status');
  const jokeEl   = document.getElementById('joke');
  const progress = document.getElementById('progress-fill');
  const start    = performance.now();

  // Status cycler
  let statusIdx = 0;
  setInterval(() => {
    statusIdx = (statusIdx + 1) % STATUSES.length;
    statusEl.textContent = STATUSES[statusIdx];
  }, STATUS_EVERY);

  // Joke cycler — avoid repeating the current joke
  let jokeIdx = 0;
  setInterval(() => {
    let next;
    do { next = Math.floor(Math.random() * JOKES.length); } while (next === jokeIdx);
    jokeIdx = next;
    // Simple fade transition
    jokeEl.style.opacity = 0;
    setTimeout(() => { jokeEl.textContent = JOKES[jokeIdx]; jokeEl.style.opacity = 1; }, 200);
  }, JOKE_EVERY);
  jokeEl.style.transition = "opacity .3s ease";

  // Progress bar fills over TOTAL_MS
  const progressTimer = setInterval(() => {
    const elapsed = performance.now() - start;
    const pct = Math.min(100, (elapsed / TOTAL_MS) * 100);
    progress.style.width = pct + "%";
    if (pct >= 100) clearInterval(progressTimer);
  }, 100);

  // Final redirect once the simulated deploy is done
  setTimeout(() => {
    statusEl.innerHTML = "All services ready — taking you to your dashboard… ✓";
    // Persist the "onboarding done" flag so future visits bypass /setup/*.
    // In production this is a server-side flag on the user record.
    try {
      const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      state.onboardingCompleted = true;
      state.deployedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* non-fatal */ }
    // In production, poll the orchestrator's /api/deploy-status until complete,
    // then redirect. For the demo, we redirect on the simulated timer.
    setTimeout(() => { window.location.href = REDIRECT_TO; }, 1200);
  }, TOTAL_MS);
</script>

</body>
</html>
