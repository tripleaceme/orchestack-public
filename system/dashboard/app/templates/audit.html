{% extends "base.html" %}

{% block content %}
  <div class="breadcrumb">Workspace / Audit</div>
  <h1 class="page-title">Audit log</h1>
  <p class="lede">
    Append-only record of every privileged action — service starts/stops,
    credential edits, sign-ins, role grants, setup deploys. Filter by
    event type, target service, or date range.
  </p>

  <form id="audit-filters"
        hx-get="{{ url_for('audit_table_fragment') }}"
        hx-target="#audit-table"
        hx-swap="innerHTML"
        hx-trigger="change from:input, change from:select, submit"
        style="background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
               padding: 14px 16px; margin-bottom: 16px;
               display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;">

    <label style="display: block;">
      <div style="font-size: 11px; color: var(--text-2); text-transform: uppercase;
                  letter-spacing: 0.6px; font-weight: 600; margin-bottom: 5px;">Event type</div>
      <input type="text" name="event_type" placeholder="e.g. service.start"
             style="width: 100%; padding: 7px 11px; border: 1px solid var(--border);
                    background: var(--bg); border-radius: 6px; font-size: 13px;
                    color: var(--text); font-family: inherit;">
    </label>

    <label style="display: block;">
      <div style="font-size: 11px; color: var(--text-2); text-transform: uppercase;
                  letter-spacing: 0.6px; font-weight: 600; margin-bottom: 5px;">Target service</div>
      <input type="text" name="target" placeholder="e.g. metabase"
             style="width: 100%; padding: 7px 11px; border: 1px solid var(--border);
                    background: var(--bg); border-radius: 6px; font-size: 13px;
                    color: var(--text); font-family: inherit;">
    </label>

    <label style="display: block;">
      <div style="font-size: 11px; color: var(--text-2); text-transform: uppercase;
                  letter-spacing: 0.6px; font-weight: 600; margin-bottom: 5px;">Since</div>
      <input type="datetime-local" name="since"
             style="width: 100%; padding: 7px 11px; border: 1px solid var(--border);
                    background: var(--bg); border-radius: 6px; font-size: 12px;
                    color: var(--text); font-family: 'JetBrains Mono', monospace;">
    </label>

    <label style="display: block;">
      <div style="font-size: 11px; color: var(--text-2); text-transform: uppercase;
                  letter-spacing: 0.6px; font-weight: 600; margin-bottom: 5px;">Until</div>
      <input type="datetime-local" name="until"
             style="width: 100%; padding: 7px 11px; border: 1px solid var(--border);
                    background: var(--bg); border-radius: 6px; font-size: 12px;
                    color: var(--text); font-family: 'JetBrains Mono', monospace;">
    </label>

    <label style="display: block;">
      <div style="font-size: 11px; color: var(--text-2); text-transform: uppercase;
                  letter-spacing: 0.6px; font-weight: 600; margin-bottom: 5px;">Per page</div>
      <select name="limit"
              style="width: 100%; padding: 7px 11px; border: 1px solid var(--border);
                     background: var(--bg); border-radius: 6px; font-size: 13px;
                     color: var(--text); font-family: inherit;">
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="200">200</option>
      </select>
    </label>
  </form>

  <div id="audit-table"
       hx-get="{{ url_for('audit_table_fragment') }}"
       hx-trigger="load delay:50ms"
       hx-swap="innerHTML"
       style="min-height: 120px;">
    <p class="muted" style="font-style: italic; font-size: 13px;">Loading audit log…</p>
  </div>
{% endblock %}
