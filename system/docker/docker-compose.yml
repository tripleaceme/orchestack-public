# OrcheStack — base control-plane Docker Compose specification.
#
# Run from this directory:
#
#   cp .env.example .env       # one-time, set ORCHESTACK_DB_PASSWORD
#   docker compose up -d        # brings up all five services
#   docker compose ps           # confirm all containers are healthy
#   open http://localhost       # nginx serves /signup (no auth yet)
#
# The Traefik dashboard is at http://localhost:18080 for debugging routes
# during development. Close this port before any production deployment.

name: orchestack

networks:
  orchestack-net:
    name: orchestack-net
    driver: bridge

volumes:
  postgres-data:
    name: orchestack-postgres-data
  # Shared between the orchestrator (writes) and managed services like
  # pgadmin (reads). Explicit `name:` so per-service compose files can
  # attach the same volume by name, regardless of compose project.
  orchestack_config:
    name: orchestack_config

services:

  # ==========================================================================
  # 0. socket-proxy — Mediates Docker socket access for Traefik.
  #
  # Why this exists instead of mounting /var/run/docker.sock directly on the
  # Traefik container:
  #
  #   1. Docker Desktop on macOS (and increasingly other rootless setups)
  #      returns "Error response from daemon:" with an empty body when a
  #      container holding /var/run/docker.sock tries to call the API —
  #      a permission boundary that's not solvable by tweaking mount flags.
  #      A proxy container that exposes the API over an internal HTTP port
  #      sidesteps this entirely.
  #
  #   2. Principle of least privilege. Traefik only needs to LIST containers
  #      and WATCH events. Mounting the full socket on Traefik would give
  #      it the ability to `docker exec`, start/stop containers, pull
  #      images, etc. — privileges it should never have. The proxy
  #      exposes only the read-only endpoints Traefik actually uses.
  #
  # Reference: https://github.com/Tecnativa/docker-socket-proxy
  # ==========================================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: orchestack-socket-proxy
    restart: unless-stopped
    environment:
      # Endpoints Traefik needs to discover containers + watch label changes.
      # Everything not listed defaults to 0 (denied).
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 1
      # Explicit denials — already 0 by default, but spelled out for the
      # next person reading this file.
      POST: 0
      EXEC: 0
      BUILD: 0
      VOLUMES: 0
      IMAGES: 0
    volumes:
      # The proxy is the ONE container that touches the host socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orchestack-net

  # ==========================================================================
  # 1. proxy — Traefik reverse proxy.
  # ==========================================================================
  proxy:
    # Pinned to a specific minor so two operators installing the same bundle
    # get the same Traefik. Floating `traefik:v3` was previously needed to
    # escape v3.2's hardcoded-v1.24 Docker API bug.
    image: traefik:v3.7
    container_name: orchestack-proxy
    restart: unless-stopped
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      # Host-side port → container-side port. Override the host side via .env
      # (PROXY_HTTP_PORT, etc.) when port 80/443 are already in use on the
      # host or you want to expose OrcheStack on a non-standard port.
      - "${PROXY_HTTP_PORT:-80}:80"          # public HTTP
      - "${PROXY_HTTPS_PORT:-443}:443"       # public HTTPS
      # Default 18080 (not 8080) because 8080 is one of the most-conflicted
      # host ports on a dev machine (Spring Boot, Tomcat, Jenkins, Jupyter,
      # OpenMetadata's ingestion sidecar, uvicorn/dev servers).
      - "${PROXY_DASHBOARD_PORT:-18080}:8080"  # Traefik dashboard — DEV ONLY
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      # NB: Traefik does NOT mount /var/run/docker.sock directly. It talks to
      # the socket-proxy container over the internal network instead — see
      # the providers.docker.endpoint in traefik.yml.
    networks:
      - orchestack-net
    depends_on:
      - socket-proxy

  # ==========================================================================
  # 2. postgres — PostgreSQL instance hosting both OrcheStack's platform DB
  # and the customer's pipeline DB. ORCHESTACK_DB_* in .env map to the
  # standard POSTGRES_* names the image requires internally.
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: orchestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORCHESTACK_DB_USER:-orchestack_admin}
      POSTGRES_PASSWORD: ${ORCHESTACK_DB_PASSWORD:?ORCHESTACK_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${ORCHESTACK_DB_NAME:-orchestack_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # postgres-init/ files run once on first container creation, lexical order.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - orchestack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # 3. auth — Signup + login + setup wizard (nginx serving static HTML).
  # ==========================================================================
  auth:
    image: tripleaceme/orchestack-auth:${AUTH_TAG:-latest}
    # Uncomment during development to rebuild from local sources. Context is
    # the repo root so the Dockerfile can COPY both system/auth/ AND
    # assets/css/ (the canonical CSS source shared with the marketing site).
    # build:
    #   context: ../..
    #   dockerfile: system/auth/Dockerfile
    container_name: orchestack-auth
    restart: unless-stopped
    networks:
      - orchestack-net
    labels:
      - traefik.enable=true
      # Traefik passes paths through to nginx unchanged (no path stripping)
      # because the nginx config in ../auth/nginx.conf expects them as-is.
      - traefik.http.routers.auth.rule=Path(`/`) || Path(`/signup`) || Path(`/login`) || PathPrefix(`/setup`) || PathPrefix(`/assets`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.services.auth.loadbalancer.server.port=80

  # ==========================================================================
  # 4. dashboard — Administrator UI (HTMX + FastAPI + Tailwind).
  # ==========================================================================
  dashboard:
    image: tripleaceme/orchestack-dashboard:${DASHBOARD_TAG:-latest}
    container_name: orchestack-dashboard
    restart: unless-stopped
    environment:
      ORCHESTRATOR_URL: http://orchestack-orchestrator:8000
      # `root_path=/app` tells FastAPI that Traefik strips this prefix
      # before forwarding, so url_for() reconstructs full external URLs.
      DASHBOARD_ROOT_PATH: /app
      DASHBOARD_LOG_LEVEL: ${DASHBOARD_LOG_LEVEL:-info}
    networks:
      - orchestack-net
    depends_on:
      - orchestrator
    volumes:
      - ./VERSION:/etc/orchestack/VERSION:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=PathPrefix(`/app`)
      - traefik.http.routers.dashboard.entrypoints=web
      - traefik.http.middlewares.dashboard-strip.stripprefix.prefixes=/app
      - traefik.http.routers.dashboard.middlewares=dashboard-strip@docker
      - traefik.http.services.dashboard.loadbalancer.server.port=8000
      # CATCH-ALL priority. The dashboard's PathPrefix(`/app`) matches
      # EVERYTHING under /app, including subpaths owned by other services
      # (e.g. /app/airflow, /app/metabase, /app/dbt-terminal, /app/pgadmin).
      # Without an explicit low priority here, Traefik's default —
      # "longer rule wins" — let the dashboard sometimes outrank per-
      # service routes whose explicit priority was set BELOW the
      # dashboard's rule length, producing the dashboard's branded 404
      # at e.g. /app/dbt-terminal/ instead of routing to the dbt
      # container's ttyd on port 7681.
      #
      # Setting priority=1 makes the dashboard the LAST-RESORT match.
      # Per-service routes need only set priority > 1 to take precedence;
      # convention is priority=200 (used by every service .yml in
      # system/docker/services/). 200 > 1 cleanly.
      - traefik.http.routers.dashboard.priority=1

  # ==========================================================================
  # 5. orchestrator — Service-lifecycle daemon.
  # ==========================================================================
  orchestrator:
    image: tripleaceme/orchestack-orchestrator:${ORCHESTRATOR_TAG:-latest}
    container_name: orchestack-orchestrator
    restart: unless-stopped
    environment:
      # Orchestrator connects only to OrcheStack's internal platform DB,
      # never to the customer warehouse DB.
      POSTGRES_HOST: orchestack-postgres
      POSTGRES_USER: ${ORCHESTACK_DB_USER:-orchestack_admin}
      POSTGRES_PASSWORD: ${ORCHESTACK_DB_PASSWORD:?ORCHESTACK_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${ORCHESTACK_DB_NAME:-orchestack_db}
      ORCHESTRATOR_LOG_LEVEL: ${ORCHESTRATOR_LOG_LEVEL:-info}
      ORCHESTRATOR_RECONCILE_INTERVAL: ${ORCHESTRATOR_RECONCILE_INTERVAL:-30}
      ORCHESTRATOR_IDLE_THRESHOLD: ${ORCHESTRATOR_IDLE_THRESHOLD:-600}
    volumes:
      # Direct socket — the orchestrator's job IS container management, so
      # full access is intentional (vs. Traefik's read-only socket-proxy).
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services:/services:ro
      # Operator's `.env` is mounted RW so the credentials-admin view in
      # the dashboard can write updated values back; the orchestrator
      # also passes it to `docker compose --env-file` for per-service
      # variable interpolation.
      - ./.env:/etc/orchestack/.env
      # Named volume (not a host bind-mount) because the per-service
      # compose subprocess runs inside the orchestrator container and
      # would resolve `./config` relative to /services/ rather than the
      # operator's bundle directory. Named volumes are resolved by the
      # host docker daemon and are visible to both containers regardless
      # of where compose ran.
      - orchestack_config:/etc/orchestack/config
    networks:
      - orchestack-net
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.orchestrator.rule=PathPrefix(`/orchestrator`)
      - traefik.http.routers.orchestrator.entrypoints=web
      # Strip /orchestrator before forwarding so /orchestrator/api/health
      # arrives at FastAPI as /api/health.
      - traefik.http.middlewares.orchestrator-strip.stripprefix.prefixes=/orchestrator
      - traefik.http.routers.orchestrator.middlewares=orchestrator-strip@docker
      - traefik.http.services.orchestrator.loadbalancer.server.port=8000
