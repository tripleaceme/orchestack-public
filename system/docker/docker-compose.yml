# OrcheStack — base control-plane Docker Compose specification.
#
# This file defines the FIVE always-on services that constitute the platform's
# base install. Optional data-pipeline services (Airbyte, dbt, MinIO, Metabase,
# Great Expectations, OpenMetadata, pgAdmin) are added at M4 through profile-
# scoped compose snippets that the orchestrator activates based on the
# administrator's setup-wizard selections.
#
# Run from this directory:
#
#   cp .env.example .env       # one-time, set ORCHESTACK_DB_PASSWORD
#   docker compose up -d        # brings up all five services
#   docker compose ps           # confirm all containers are healthy
#   open http://localhost       # nginx serves /signup (no auth yet)
#
# The Traefik dashboard is at http://localhost:8080 for debugging routes
# during development. Close this port before any production deployment.

name: orchestack

# ----------------------------------------------------------------------------
# Networks — one shared bridge network so all containers can reach each other
# by service name (e.g. orchestack-postgres). Traefik's `network:` directive
# in traefik.yml binds it to this same network.
# ----------------------------------------------------------------------------
networks:
  orchestack-net:
    name: orchestack-net
    driver: bridge

# ----------------------------------------------------------------------------
# Volumes — only PostgreSQL needs persistence at M1. Adding more later (MinIO
# bucket storage, Airflow logs, etc.) happens at M4.
# ----------------------------------------------------------------------------
volumes:
  postgres-data:
    name: orchestack-postgres-data

services:

  # ==========================================================================
  # 0. socket-proxy — Mediates Docker socket access for Traefik.
  #
  # Why this exists instead of mounting /var/run/docker.sock directly on the
  # Traefik container:
  #
  #   1. Docker Desktop on macOS (and increasingly other rootless setups)
  #      returns "Error response from daemon:" with an empty body when a
  #      container holding /var/run/docker.sock tries to call the API —
  #      a permission boundary that's not solvable by tweaking mount flags.
  #      A proxy container that exposes the API over an internal HTTP port
  #      sidesteps this entirely.
  #
  #   2. Principle of least privilege. Traefik only needs to LIST containers
  #      and WATCH events. Mounting the full socket on Traefik would give
  #      it the ability to `docker exec`, start/stop containers, pull
  #      images, etc. — privileges it should never have. The proxy
  #      exposes only the read-only endpoints Traefik actually uses.
  #
  # Reference: https://github.com/Tecnativa/docker-socket-proxy
  # ==========================================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: orchestack-socket-proxy
    restart: unless-stopped
    environment:
      # Endpoints Traefik needs to discover containers + watch label changes.
      # Everything not listed defaults to 0 (denied).
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 1
      # Explicit denials — already 0 by default, but spelled out for the
      # next person reading this file.
      POST: 0
      EXEC: 0
      BUILD: 0
      VOLUMES: 0
      IMAGES: 0
    volumes:
      # The proxy is the ONE container that touches the host socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orchestack-net

  # ==========================================================================
  # 1. proxy — Traefik reverse proxy.
  # Routes incoming traffic to internal services based on URL path. See
  # ./traefik/traefik.yml for the static config and the per-service `labels:`
  # below for the routing rules.
  # ==========================================================================
  proxy:
    # Pinned to traefik:v3.7 (the floating tag for the latest v3.7.x patch).
    # We previously used the floating `traefik:v3` tag to escape v3.2's
    # hardcoded-v1.24 Docker API bug; now we pin to the specific minor so
    # two operators installing the same bundle get the same Traefik. The
    # v3.7.x line is stable as of 2026-06; bump this when a future minor
    # ships features we want (or when v3.7 stops receiving security fixes).
    image: traefik:v3.7
    container_name: orchestack-proxy
    restart: unless-stopped
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      # Host-side port → container-side port. Override the host side via .env
      # (PROXY_HTTP_PORT, etc.) when port 80/443 are already in use on the
      # host or you want to expose OrcheStack on a non-standard port.
      - "${PROXY_HTTP_PORT:-80}:80"        # public HTTP
      - "${PROXY_HTTPS_PORT:-443}:443"     # public HTTPS (TLS via Let's Encrypt at M5)
      - "${PROXY_DASHBOARD_PORT:-8080}:8080"  # Traefik dashboard — DEV ONLY; close before production
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      # NB: Traefik does NOT mount /var/run/docker.sock directly. It talks to
      # the socket-proxy container over the internal network instead — see
      # the providers.docker.endpoint in traefik.yml.
    networks:
      - orchestack-net
    depends_on:
      - socket-proxy

  # ==========================================================================
  # 2. postgres — PostgreSQL instance (hosts two logical databases).
  #
  # On first boot, this container bootstraps OrcheStack's own database (named
  # by ORCHESTACK_DB_NAME, default 'orchestack') with the `platform.*` schema
  # (users, roles, sessions, service_pinning, service_sessions, audit_log).
  # Created by SQL files in ./postgres-init/.
  #
  # The customer's PIPELINE database (raw.*, marts.*, Airflow metadata) is
  # created later, after the operator completes the setup wizard — the
  # orchestrator (M2) runs `CREATE DATABASE <pipeline_db>;` against this same
  # instance using the values collected in the wizard's PostgreSQL section.
  # That keeps OrcheStack metadata and customer data cleanly separated even
  # though they share one Postgres process.
  #
  # The container's POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB env vars
  # come from ORCHESTACK_DB_* in .env (renamed in .env for clarity — these
  # are OrcheStack's own bootstrap credentials, not the customer's). The
  # postgres image still requires the standard POSTGRES_* names internally.
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: orchestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ORCHESTACK_DB_USER:-orchestack}
      POSTGRES_PASSWORD: ${ORCHESTACK_DB_PASSWORD:?ORCHESTACK_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${ORCHESTACK_DB_NAME:-orchestack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # postgres-init/ files run once on first container creation (lexical order).
      # 00-init.sql creates the platform schema; 10-platform-schema.sql adds tables.
      # The pipeline database/schemas are added later by the orchestrator (M2).
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - orchestack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # 3. auth — Signup + login + setup wizard (nginx serving static HTML).
  # Image is built from OrcheStack/system/auth/ (with the repo root as build
  # context so the Dockerfile can pull in the shared assets/css/) and pushed
  # to Docker Hub as tripleaceme/orchestack-auth. During development, you can
  # uncomment the `build:` block below to rebuild from local sources instead
  # of pulling from Docker Hub.
  # ==========================================================================
  auth:
    image: tripleaceme/orchestack-auth:${AUTH_TAG:-latest}
    # Uncomment during development to rebuild the auth image from the local
    # Dockerfile instead of pulling from Docker Hub. The context is the
    # OrcheStack repo root (../.. from here, since this file lives in
    # system/docker/) so the Dockerfile can COPY both system/auth/ AND
    # assets/css/ — the latter is the single canonical CSS source shared with
    # the marketing site.
    # build:
    #   context: ../..
    #   dockerfile: system/auth/Dockerfile
    container_name: orchestack-auth
    restart: unless-stopped
    networks:
      - orchestack-net
    labels:
      - traefik.enable=true
      # One router catches all the auth/setup paths PLUS the bare '/'.
      # The bare '/' is here because on first install there's no Streamlit
      # serving the dashboard yet — auth's nginx redirects '/' to '/signup'
      # so a new operator hitting http://localhost lands somewhere useful.
      # At M3 when Streamlit becomes real, '/' moves to the streamlit
      # router and auth's redirect becomes a fallback.
      # Traefik passes paths through to nginx unchanged (no path stripping)
      # because the nginx config in ../auth/nginx.conf expects them as-is.
      - traefik.http.routers.auth.rule=Path(`/`) || Path(`/signup`) || Path(`/login`) || PathPrefix(`/setup`) || PathPrefix(`/assets`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.services.auth.loadbalancer.server.port=80

  # ==========================================================================
  # 4. dashboard — Administrator UI (HTMX + FastAPI + Tailwind).
  #
  # Phase 3.1 (current): skeleton — renders one page that proxies the
  # orchestrator's /api/health and displays the result. Service grid,
  # sessions, audit log, and keep-warm controls land in later M3 phases.
  #
  # The compose service name stays `streamlit` during M3 so the existing
  # Traefik PathPrefix(`/app`) route + stripprefix middleware keeps
  # working without coordination. A folder + service-name rename to
  # `dashboard` ships in a separate cleanup commit after M3.5 stabilises.
  # Image name flipped to `orchestack-dashboard` now because we're never
  # going to populate `orchestack-streamlit` on Docker Hub — no point
  # deprecating a name we never used.
  # ==========================================================================
  streamlit:
    image: tripleaceme/orchestack-dashboard:${DASHBOARD_TAG:-latest}
    container_name: orchestack-dashboard
    restart: unless-stopped
    environment:
      # The dashboard talks to the orchestrator over the internal Docker
      # network. Service-name resolution does the work; no Docker socket
      # mount needed.
      ORCHESTRATOR_URL: http://orchestack-orchestrator:8000
      # `root_path=/app` tells FastAPI that Traefik strips this prefix
      # before forwarding. Jinja2's url_for() reconstructs the full
      # external URL when generating links in HTML templates.
      DASHBOARD_ROOT_PATH: /app
      DASHBOARD_LOG_LEVEL: ${DASHBOARD_LOG_LEVEL:-info}
    networks:
      - orchestack-net
    depends_on:
      - orchestrator
    labels:
      - traefik.enable=true
      - traefik.http.routers.streamlit.rule=PathPrefix(`/app`)
      - traefik.http.routers.streamlit.entrypoints=web
      # Strip /app prefix before forwarding — dashboard's internal routes
      # are at `/`, `/api/dashboard/*`. FastAPI's root_path setting handles
      # URL generation back the other way.
      - traefik.http.middlewares.streamlit-strip.stripprefix.prefixes=/app
      - traefik.http.routers.streamlit.middlewares=streamlit-strip@docker
      # Dashboard listens on 8000 (FastAPI/uvicorn default), not the
      # nginx-default 80 the M1 stub used.
      - traefik.http.services.streamlit.loadbalancer.server.port=8000

  # ==========================================================================
  # 5. orchestrator — Service-lifecycle daemon.
  #
  # Phase 2.1 (current): FastAPI skeleton serving /api/health. Pulled from
  # Docker Hub as tripleaceme/orchestack-orchestrator. The compose service
  # name, container name, network, and dependencies are stable from the
  # M1 stub — only the image changed. Same swap pattern that auth uses.
  #
  # Future phases bring up service-control endpoints (POST /api/services/*),
  # the reconciler loop (idle-sweep cold-tier services), and the wizard
  # handoff (POST /api/setup/deploy). See design/m2-orchestrator.md for the
  # full plan.
  #
  # No Docker socket mount yet — phase 2.2 wires this up via the existing
  # socket-proxy service (the same one Traefik uses), not a direct
  # /var/run/docker.sock mount. That keeps the socket-access boundary
  # consistent across the platform.
  # ==========================================================================
  orchestrator:
    image: tripleaceme/orchestack-orchestrator:${ORCHESTRATOR_TAG:-latest}
    container_name: orchestack-orchestrator
    restart: unless-stopped
    environment:
      # Orchestrator connects to OrcheStack's INTERNAL database to read
      # platform.* tables (users, service_sessions, pinning). It does NOT
      # connect to the customer pipeline DB. Pipeline-DB credentials come
      # from the setup wizard and are passed to the per-service containers
      # the orchestrator spawns (dbt, Airflow, Airbyte) at M4.
      POSTGRES_HOST: orchestack-postgres
      POSTGRES_USER: ${ORCHESTACK_DB_USER:-orchestack}
      POSTGRES_PASSWORD: ${ORCHESTACK_DB_PASSWORD:?ORCHESTACK_DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${ORCHESTACK_DB_NAME:-orchestack}
      # Logging verbosity. Stays low by default; bump to "debug" when
      # tracing reconciler behaviour or investigating a stuck service.
      ORCHESTRATOR_LOG_LEVEL: ${ORCHESTRATOR_LOG_LEVEL:-info}
      # How often the reconciler tick fires (seconds). Override here or
      # via .env when calibrating during M5 evaluation.
      ORCHESTRATOR_RECONCILE_INTERVAL: ${ORCHESTRATOR_RECONCILE_INTERVAL:-30}
      # How long an idle service can stay running before the reconciler
      # stops it. 10 minutes by default.
      ORCHESTRATOR_IDLE_THRESHOLD: ${ORCHESTRATOR_IDLE_THRESHOLD:-600}
    volumes:
      # Direct Docker socket — the orchestrator's job IS container management
      # so it gets full socket access. (Traefik uses the socket-proxy because
      # it only needs read access for discovery; same threat model doesn't
      # apply here.) The upstream Docker CLI bundled in the orchestrator
      # image does proper API version negotiation, sidestepping Traefik's
      # earlier v1.24 problem.
      - /var/run/docker.sock:/var/run/docker.sock
      # Per-service compose snippets. Mounted read-only — the orchestrator
      # reads but never writes them. Adding a new managed service is a
      # bundle update (new yml + SERVICE_CATALOGUE entry), not a runtime
      # operation.
      - ./services:/services:ro
    networks:
      - orchestack-net
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      # Phase 2.1 mounts the orchestrator at /orchestrator/* so Streamlit
      # (M3) can call it via the same hostname. Path-prefix matched at
      # Traefik; the FastAPI app sees the un-stripped path (matches its
      # /api/* routes natively because the prefix is preserved).
      - traefik.http.routers.orchestrator.rule=PathPrefix(`/orchestrator`)
      - traefik.http.routers.orchestrator.entrypoints=web
      # Strip /orchestrator before forwarding so /orchestrator/api/health
      # arrives at FastAPI as /api/health.
      - traefik.http.middlewares.orchestrator-strip.stripprefix.prefixes=/orchestrator
      - traefik.http.routers.orchestrator.middlewares=orchestrator-strip@docker
      - traefik.http.services.orchestrator.loadbalancer.server.port=8000
