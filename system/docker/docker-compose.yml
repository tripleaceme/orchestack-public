# OrcheStack — base control-plane Docker Compose specification.
#
# This file defines the FIVE always-on services that constitute the platform's
# base install. Optional data-pipeline services (Airbyte, dbt, MinIO, Metabase,
# Great Expectations, OpenMetadata, pgAdmin) are added at M4 through profile-
# scoped compose snippets that the orchestrator activates based on the
# administrator's setup-wizard selections.
#
# Run from this directory:
#
#   cp .env.example .env       # one-time, set POSTGRES_PASSWORD
#   docker compose up -d        # brings up all five services
#   docker compose ps           # confirm all containers are healthy
#   open http://localhost       # nginx serves /signup (no auth yet)
#
# The Traefik dashboard is at http://localhost:8080 for debugging routes
# during development. Close this port before any production deployment.

name: orchestack

# ----------------------------------------------------------------------------
# Networks — one shared bridge network so all containers can reach each other
# by service name (e.g. orchestack-postgres). Traefik's `network:` directive
# in traefik.yml binds it to this same network.
# ----------------------------------------------------------------------------
networks:
  orchestack-net:
    name: orchestack-net
    driver: bridge

# ----------------------------------------------------------------------------
# Volumes — only PostgreSQL needs persistence at M1. Adding more later (MinIO
# bucket storage, Airflow logs, etc.) happens at M4.
# ----------------------------------------------------------------------------
volumes:
  postgres-data:
    name: orchestack-postgres-data

services:

  # ==========================================================================
  # 1. proxy — Traefik reverse proxy.
  # Routes incoming traffic to internal services based on URL path. See
  # ./traefik/traefik.yml for the static config and the per-service `labels:`
  # below for the routing rules.
  # ==========================================================================
  proxy:
    image: traefik:v3.2
    container_name: orchestack-proxy
    restart: unless-stopped
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      # Host-side port → container-side port. Override the host side via .env
      # (PROXY_HTTP_PORT, etc.) when port 80/443 are already in use on the
      # host or you want to expose OrcheStack on a non-standard port.
      - "${PROXY_HTTP_PORT:-80}:80"        # public HTTP
      - "${PROXY_HTTPS_PORT:-443}:443"     # public HTTPS (TLS via Let's Encrypt at M5)
      - "${PROXY_DASHBOARD_PORT:-8080}:8080"  # Traefik dashboard — DEV ONLY; close before production
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      # Read-only Docker socket so Traefik can discover containers via labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orchestack-net

  # ==========================================================================
  # 2. postgres — Platform PostgreSQL (metadata + warehouse).
  # Holds the platform.* schema (users, roles, sessions, service_pinning,
  # service_sessions, audit_log) — created by SQL files in ./postgres-init/.
  # Later also holds raw.* (Airbyte landing) and marts.* (dbt outputs).
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: orchestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-orchestack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # postgres-init/ files run once on first container creation (lexical order).
      # 00-init.sql creates the schemas; 10-platform-schema.sql (step 1.3) adds tables.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - orchestack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================================================
  # 3. auth — Signup + login + setup wizard (nginx serving static HTML).
  # Image is built from OrcheStack/system/docs-portal/ and pushed to Docker
  # Hub as tripleaceme/orchestack-auth. During development, you can swap the
  # `image:` line for `build: ../docs-portal` to test local changes without
  # pushing.
  # ==========================================================================
  auth:
    image: tripleaceme/orchestack-auth:${AUTH_TAG:-latest}
    # Uncomment during development to rebuild the auth image from the local
    # Dockerfile instead of pulling from Docker Hub:
    # build:
    #   context: ../docs-portal
    container_name: orchestack-auth
    restart: unless-stopped
    networks:
      - orchestack-net
    labels:
      - traefik.enable=true
      # One router catches all the auth/setup paths. Traefik passes them through
      # to nginx unchanged (no path stripping) because the nginx config in
      # ../docs-portal/nginx.conf expects them as-is.
      - traefik.http.routers.auth.rule=Path(`/signup`) || Path(`/login`) || PathPrefix(`/setup`) || PathPrefix(`/assets`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.services.auth.loadbalancer.server.port=80

  # ==========================================================================
  # 4. streamlit — Administrator dashboard.
  # M1: nginx serving a static placeholder page. M3 replaces this with the
  # real Streamlit app from tripleaceme/orchestack-streamlit.
  # ==========================================================================
  streamlit:
    image: nginx:alpine
    container_name: orchestack-streamlit
    restart: unless-stopped
    volumes:
      - ./stubs/streamlit-stub.html:/usr/share/nginx/html/index.html:ro
    networks:
      - orchestack-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.streamlit.rule=PathPrefix(`/app`)
      - traefik.http.routers.streamlit.entrypoints=web
      # Strip /app prefix before forwarding so nginx serves index.html at /.
      # The real Streamlit (M3) will use STREAMLIT_SERVER_BASE_URL_PATH=/app
      # instead and NOT need stripping — that's a deliberate M3 swap.
      - traefik.http.middlewares.streamlit-strip.stripprefix.prefixes=/app
      - traefik.http.routers.streamlit.middlewares=streamlit-strip@docker
      - traefik.http.services.streamlit.loadbalancer.server.port=80

  # ==========================================================================
  # 5. orchestrator — Service-lifecycle daemon.
  # M1: alpine container running a heartbeat loop. M2 replaces this with the
  # real Python orchestrator from tripleaceme/orchestack-orchestrator. The
  # orchestrator has NO HTTP surface — it reads platform.service_sessions and
  # platform.service_pinning, controls containers via the Docker socket.
  # ==========================================================================
  orchestrator:
    image: alpine:3.20
    container_name: orchestack-orchestrator
    restart: unless-stopped
    command:
      - sh
      - -c
      - 'echo "[orchestrator] M1 stub — real implementation in M2"; while true; do echo "[orchestrator] $(date -Iseconds) idle tick"; sleep 60; done'
    volumes:
      # The real orchestrator (M2) needs the Docker socket to start/stop
      # cold-tier service containers. The stub does not use it but we mount
      # it now so the compose contract is stable across the M1→M2 swap.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      POSTGRES_HOST: orchestack-postgres
      POSTGRES_USER: ${POSTGRES_USER:-orchestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-orchestack}
    networks:
      - orchestack-net
    depends_on:
      postgres:
        condition: service_healthy
