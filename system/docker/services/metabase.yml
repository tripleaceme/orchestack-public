# Metabase — BI dashboard (hot-tier).
#
# Hot-tier: reconciler exempts `orchestack.tier=hot` from idle sweeps because
# Metabase serves scheduled dashboards (Slack snapshots, scheduled emails).

services:
  metabase:
    image: metabase/metabase:v0.51.7
    container_name: orchestack-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: orchestack-postgres
      MB_DB_PORT: 5432
      # Metabase needs its OWN database (not a schema in `services`) because
      # Metabase 0.51's initialization migration HARDCODES `public.<tablename>`
      # in every CREATE TABLE — MB_DB_SCHEMA is honored only for runtime
      # queries, not for the first-boot Liquibase migration.
      MB_DB_USER: ${METABASE_DB_USER:-metabase_admin}
      MB_DB_PASS: ${METABASE_DB_PASSWORD:-}
      MB_DB_DBNAME: metabase_db
      MB_SITE_URL: http://localhost/app/metabase
    networks:
      - orchestack-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18           # 18 * 10s = 3 min before declared unhealthy
      start_period: 30s     # Don't count failures during the first 30s
    labels:
      # Reconciler tags filtered by orchestrator's docker_ops — keep in sync
      # with SERVICE_CATALOGUE in app/config.py.
      - orchestack.service=metabase
      - orchestack.tier=hot
      - traefik.enable=true
      - traefik.http.routers.metabase.rule=PathPrefix(`/app/metabase`)
      - traefik.http.routers.metabase.entrypoints=web
      # Explicit priority=200 (vs default rule-length ~30) so /app/metabase
      # unambiguously beats the dashboard's /app prefix; rule-length tiebreaker
      # alone proved unreliable and served the FastAPI 404 instead.
      - traefik.http.routers.metabase.priority=200
      - traefik.http.middlewares.metabase-strip.stripprefix.prefixes=/app/metabase
      - traefik.http.routers.metabase.middlewares=metabase-strip@docker
      - traefik.http.services.metabase.loadbalancer.server.port=3000
      # No Traefik loadbalancer healthcheck: Metabase's /api/health returns 503
      # during the 60-90s Liquibase init (Jetty up, migration running) and a
      # Traefik-level check would mark the backend down for that whole window.
      # Rely on the Docker container healthcheck above instead.

  # Do NOT re-add a Traefik loadbalancer healthcheck: 502s during init are
  # downstream of `start_period` on the container check — bump that instead.
  # A duplicate Traefik check makes /app/metabase fall through to /app and
  # serve the dashboard's FastAPI 404.

networks:
  orchestack-net:
    external: true
    name: orchestack-net
