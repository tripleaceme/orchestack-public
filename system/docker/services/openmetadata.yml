# OpenMetadata — governance + observability (cold-tier).
#
# Uses its own `openmetadata` database (NOT a schema in services). Same
# constraint as Metabase: OpenMetadata's Flyway migrations write to
# `public.<tablename>` with no honorable schema setting. Tested against
# the schema-aware contract; failed; per-DB is the architecturally
# honest choice.
#
# OpenMetadata's deployment also requires Elasticsearch (for full-text
# search) and an Airflow-side ingestion runner. For M4.6 we ship the
# OpenMetadata server alone with embedded Elasticsearch via the
# openmetadata-server distribution. ES-as-sidecar in M5+.

services:
  # Single openmetadata/server:1.6.5 container that runs migrations
  # before starting the server in the same process tree.
  #
  # Why this shape (instead of the upstream-recommended two-container
  # init-runner + server split): on a single-tenant install the split
  # leaves a "stopped" migrate container sitting in Docker forever
  # after exiting 0, which is visually confusing — operators see two
  # openmetadata containers and assume one is duplicate/broken. The
  # combined `command:` runs migrate first (Flyway is idempotent —
  # detects "no new migrations" in ~5s on warm starts) then exec's the
  # server. Behaviour-equivalent to the split, one less container in
  # `docker ps`.
  #
  # Multi-replica deployments would need to revert to the split so
  # only one replica migrates — that's an M5+ concern when we get to
  # the cluster mode.
  openmetadata:
    image: docker.getcollate.io/openmetadata/server:1.6.5
    container_name: orchestack-openmetadata
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "[orchestack] running OpenMetadata DB migrations…"
        ./bootstrap/openmetadata-ops.sh migrate
        echo "[orchestack] starting OpenMetadata server…"
        exec /openmetadata-start.sh
    depends_on:
      openmetadata-es:
        condition: service_healthy
    environment:
      # Database — uses the openmetadata_admin role + openmetadata_db
      # database that the orchestrator's _ensure_openmetadata_setup hook
      # provisions on first start. User defaults match the convention
      # but can be overridden via OPENMETADATA_DB_USER in .env.
      DB_USER:     ${OPENMETADATA_DB_USER:-openmetadata_admin}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-}
      DB_HOST:     orchestack-postgres
      DB_PORT:     "5432"
      OM_DATABASE: openmetadata_db
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME:   postgresql
      # Auth — JWT + basic
      AUTHENTICATION_PROVIDER:   basic
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_INGESTION_PRINCIPALS: "[ingestion-bot]"
      JWT_TOKEN_SECRET_KEY: ${OPENMETADATA_JWT_SECRET:?OPENMETADATA_JWT_SECRET must be set in .env}
      OM_ADMIN_EMAIL:       ${OPENMETADATA_ADMIN_EMAIL:?OPENMETADATA_ADMIN_EMAIL must be set in .env}
      OM_ADMIN_PASSWORD:    ${OPENMETADATA_ADMIN_PASSWORD:?OPENMETADATA_ADMIN_PASSWORD must be set in .env}
      # Search
      SEARCH_TYPE:   elasticsearch
      ELASTICSEARCH_HOST: openmetadata-es
      ELASTICSEARCH_PORT: "9200"
      # Subpath
      SERVER_HOST_API_URL: http://localhost/app/openmetadata/api
      WEB_CONF_URI:        http://localhost/app/openmetadata
    networks:
      - orchestack-net
    healthcheck:
      # OpenMetadata's base image ships with wget (not curl) and exposes
      # /healthcheck on the Dropwizard ADMIN port 8586 — NOT the API
      # port 8585. The previous curl+8585 check silently failed forever
      # (curl not in PATH; container reported "starting" until retries
      # exhausted then went unhealthy even though the server was fine).
      test: ["CMD-SHELL", "wget -qO- http://localhost:8586/healthcheck | grep -q '\"healthy\":true' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 18
      start_period: 120s
    labels:
      - orchestack.service=openmetadata
      - orchestack.tier=cold
      - traefik.enable=true
      - traefik.http.routers.openmetadata.rule=PathPrefix(`/app/openmetadata`)
      - traefik.http.routers.openmetadata.entrypoints=web
      - traefik.http.routers.openmetadata.priority=200
      - traefik.http.middlewares.openmetadata-strip.stripprefix.prefixes=/app/openmetadata
      - traefik.http.routers.openmetadata.middlewares=openmetadata-strip@docker
      - traefik.http.services.openmetadata.loadbalancer.server.port=8585

  # Required sidecar for OpenMetadata's full-text search. Not exposed
  # outside the docker network; OpenMetadata is the only client.
  openmetadata-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: orchestack-openmetadata-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    networks:
      - orchestack-net
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data
    healthcheck:
      # ES isn't reachable on its API until cluster status is at least
      # yellow. Without this check, openmetadata-migrate's `depends_on:
      # service_started` returns true the moment the JVM is alive but
      # the index API still 503s — which is exactly the
      # `java.net.ConnectException: Connection refused` trace we saw
      # when migrate tried to update aliases on restart. Probe the
      # cluster-health endpoint with wait_for_status=yellow; it returns
      # 200 only when ES can actually serve queries.
      #
      # The ES 8.11.4 image has `curl` but NOT `wget` (unlike most other
      # base images we deal with) — using wget here returns 127 and the
      # container stays unhealthy forever.
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -qE '\"status\":\"(yellow|green)\"' || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 60s

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  openmetadata-es-data:
    name: orchestack-openmetadata-es-data
