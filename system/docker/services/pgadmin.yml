# pgAdmin — database admin UI (cold-tier).
#
# Cold-tier: stopped by the reconciler when there are no active sessions
# and the operator hasn't pinned it. Typical use is "open pgAdmin, debug a
# query, close it" — no reason to keep it warm.
#
# Brought up on session-open via:
#   docker compose -f services/pgadmin.yml -p orchestack-service-pgadmin up -d

services:
  pgadmin:
    image: dpage/pgadmin4:8.13
    container_name: orchestack-pgadmin
    restart: unless-stopped
    environment:
      # M2 default admin credentials. Override via the wizard at M2.5 or
      # rotate via the dashboard once M3 lands.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin_admin@orchestack.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-orchestack-dev-changeme}
      # Disable the multi-user "server mode" — for a single-tenant install,
      # the auth layer is OrcheStack itself, not pgAdmin's own user table.
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      # Skip the master-password prompt on first connect. The master
      # password is pgAdmin's local-disk encryption for stored DB
      # passwords; in OrcheStack the operator's pipeline-DB password
      # already lives in our own .env (under the orchestack_config
      # volume scoped to this container), so the extra encryption layer
      # only adds a confusing prompt without protecting anything new.
      # See pgAdmin docs: /app/pgadmin/help/help/master_password.html
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      # Allow .local TLDs in the admin email. pgAdmin uses Python's
      # email-validator package which strictly validates the TLD against
      # the IANA list — ".local" is reserved (RFC 6762) but NOT in IANA
      # so pgAdmin rejects it. CHECK_EMAIL_DELIVERABILITY only disables
      # the MX-record probe; this is the separate knob for the TLD check.
      # Wizard defaults admin emails to admin@<company>.local; without
      # this, pgAdmin crashes on every start in a restart loop.
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: 'False'
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: "['local','localhost','example']"
      # Subpath deployment: served at /app/pgadmin/ via Traefik. pgAdmin
      # respects SCRIPT_NAME — Traefik passes the prefix in the header.
      SCRIPT_NAME: /app/pgadmin
      # Pre-load OrcheStack's databases into pgAdmin's navigator so the
      # operator doesn't have to manually add server connections. The
      # orchestrator's _ensure_pgadmin_servers_json pre-start hook
      # materialises this file into the shared `orchestack_config`
      # named volume BEFORE compose up runs; we mount that volume into
      # /etc/orchestack/conf below and point pgAdmin at it.
      #
      # Passwords are intentionally NOT in this file — pgAdmin's auto-
      # import drops them for security and the operator types them once
      # on first connect.
      # Path matches where the orchestrator's _ensure_pgadmin_servers_json
      # hook writes inside the shared volume — the volume is mounted at
      # /etc/orchestack/config in the orchestrator and /etc/orchestack/conf
      # here, with the `pgadmin/servers.json` layout preserved across both
      # (we keep subdirectories so M4 can add airflow-connections.json,
      # great-expectations/checkpoints, etc. without colliding).
      PGADMIN_SERVER_JSON_FILE: /etc/orchestack/conf/pgadmin/servers.json
    networks:
      - orchestack-net
    volumes:
      # Pick up the pre-loaded servers.json the orchestrator's pre-start
      # hook wrote to the shared orchestack_config volume. Mounted RO —
      # pgAdmin doesn't need to mutate this file. If the orchestrator's
      # hook didn't run (network blip, DB not yet up), pgAdmin starts
      # with an empty server list and the operator adds entries by hand.
      - orchestack_config:/etc/orchestack/conf:ro
    # pgAdmin starts serving on port 80 once its internal SQLite is
    # initialised — typically ~10–15s from container start. Without this
    # healthcheck Traefik routes requests at the container immediately
    # and the operator sees a 502 Bad Gateway during that window.
    # NOTE: the healthcheck URL MUST start with SCRIPT_NAME (/app/pgadmin).
    # pgAdmin enforces that every request path begin with SCRIPT_NAME and
    # returns gunicorn's ConfigurationProblem (500) for anything else,
    # including in-container healthcheck probes calling localhost:80. A
    # bare /misc/ping crashes the worker, the container goes unhealthy,
    # and Traefik falls back to the dashboard's /app prefix — symptom is
    # the operator clicking Open and seeing the dashboard's FastAPI 404.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/app/pgadmin/misc/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    labels:
      - orchestack.service=pgadmin
      - orchestack.tier=cold
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=PathPrefix(`/app/pgadmin`)
      - traefik.http.routers.pgadmin.entrypoints=web
      # Same explicit-priority reasoning as metabase.yml — beats the
      # dashboard's /app prefix unambiguously, regardless of how Traefik
      # computes rule-length tiebreakers in this version.
      - traefik.http.routers.pgadmin.priority=200
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      # No Traefik loadbalancer healthcheck — see the note in metabase.yml
      # for the full reasoning. The container healthcheck above with
      # start_period: 15s is the single source of truth for "is pgAdmin
      # ready." A Traefik-level check would create a second probe with
      # different failure semantics, which previously caused /app/pgadmin
      # to fall through to the dashboard's /app prefix and serve a
      # FastAPI 404 instead of the pgAdmin UI.

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  # Declared external — the volume is created by the base compose stack
  # (system/docker/docker-compose.yml). This snippet just attaches to it
  # so the orchestrator's writes are visible to pgadmin.
  orchestack_config:
    external: true
    name: orchestack_config
