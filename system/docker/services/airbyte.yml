# Airbyte — ingestion (hot-tier).
#
# Airbyte's full deployment is multi-container (server, webapp, worker,
# temporal, connector-builder, etc.). For OrcheStack's scale we use the
# single-image "abctl" pattern that bundles the core services. Operators
# who outgrow this can swap to the helm chart in M5+.
#
# Uses its own `airbyte` database (NOT a schema in services) because
# Airbyte's schema layout assumes ownership of the DB and runs raw
# CREATE EXTENSION calls during init. Tested empirically against the
# same schema-aware contract Metabase failed: Airbyte requires a
# dedicated database.

services:
  airbyte:
    image: airbyte/airbyte:1.7.4
    container_name: orchestack-airbyte
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://orchestack-postgres:5432/airbyte
      DATABASE_USER:     airbyte
      DATABASE_PASSWORD: ${AIRBYTE_DB_PASSWORD:-}
      DATABASE_HOST:     orchestack-postgres
      DATABASE_PORT:     "5432"
      DATABASE_DB:       airbyte
      AIRBYTE_VERSION:   1.7.4
      AIRBYTE_EDITION:   community
      WEBAPP_URL:        http://localhost/app/airbyte
      # Workspace identity — these are Airbyte's first-run defaults; the
      # orchestrator's post-start hook can override them via the
      # /api/v1/workspaces endpoint.
      WORKSPACE_DOCKER_MOUNT:  airbyte-workspace
      WORKSPACE_ROOT:          /tmp/workspace
      LOCAL_ROOT:              /tmp/airbyte_local
      AIRBYTE_ROLE:            community
    networks:
      - orchestack-net
    volumes:
      - airbyte-data:/data
      - airbyte-workspace:/tmp/workspace
      - airbyte-config:/etc/airbyte
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 24
      start_period: 60s
    labels:
      - orchestack.service=airbyte
      - orchestack.tier=hot
      - traefik.enable=true
      - traefik.http.routers.airbyte.rule=PathPrefix(`/app/airbyte`)
      - traefik.http.routers.airbyte.entrypoints=web
      - traefik.http.routers.airbyte.priority=200
      - traefik.http.middlewares.airbyte-strip.stripprefix.prefixes=/app/airbyte
      - traefik.http.routers.airbyte.middlewares=airbyte-strip@docker
      - traefik.http.services.airbyte.loadbalancer.server.port=8000

networks:
  orchestack-net:
    external: true
    name: orchestack-net

volumes:
  airbyte-data:
    name: orchestack-airbyte-data
  airbyte-workspace:
    name: orchestack-airbyte-workspace
  airbyte-config:
    name: orchestack-airbyte-config
