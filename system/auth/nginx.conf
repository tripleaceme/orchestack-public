# OrcheStack in-package auth + setup container.
#
# This container is NOT the public marketing site. The marketing/docs site is
# hosted externally (see ../../website/) — discoverable via Google, served from
# the OrcheStack team's own domain. It is NOT baked into the customer's install.
#
# What this container serves (runs on every customer's host after
# `docker compose up OrcheStack`):
#
#   - /signup       → first-admin bootstrap form
#   - /login        → admin auth
#   - /setup/*      → 4-step onboarding wizard (welcome / select / configure /
#                     deploying) — only shown on first run or when the admin
#                     explicitly clicks "Add services" in the dashboard
#   - /assets/*     → shared CSS/JS
#
# It does NOT serve / (marketing landing), /services, /docs/*, or /contact —
# those live on the external website only.
#
# The top-level OrcheStack reverse proxy (Traefik) fronts this container and
# routes /app/* to the dashboard. If a customer hits / on a fresh install, Traefik
# decides between /signup (no users yet) and /login (users exist) based on a
# dashboard health endpoint.

server {
    # Listen on both IPv4 and IPv6. The nginx Docker image normally adds the
    # IPv6 listener via its /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh,
    # but that script only patches /etc/nginx/conf.d/default.conf — which we
    # delete in the Dockerfile so our OrcheStack.conf takes over. Without an
    # explicit IPv6 listener here, busybox's `wget` (which resolves localhost
    # to ::1 first) gets "Connection refused" during the container's own
    # healthcheck — even though the container is serving fine over IPv4.
    listen       80 default_server;
    listen  [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Charset and security headers (baseline — the top-level proxy adds more)
    charset utf-8;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pretty URLs — serve /signup as /signup.html, /login as /login.html
    location = /signup { try_files /signup.html =404; }
    location = /login  { try_files /login.html =404; }

    # First-install landing: anyone hitting '/' (no path) is redirected to
    # /signup so they don't see an empty 404. Once the dashboard owns '/'
    # via Traefik, this redirect becomes dead code — harmless to leave in.
    location = / { return 302 /signup; }

    # Container healthcheck endpoint — probed by HEALTHCHECK in the
    # Dockerfile. Returns a tiny plain-text 200 with no log noise. Faster
    # than probing /login (no template render, no try_files lookup) and
    # works even when the rest of nginx is busy.
    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    # Setup wizard — pretty URLs for each step
    location /setup/ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Static assets: aggressive caching (CSS, images, fonts)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML files: no caching — so image rebuilds propagate immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Root and anything else not matched above → 404.
    # The top-level OrcheStack proxy is responsible for / routing; if a request
    # for / hits this container directly it's a misconfiguration.
    location / {
        return 404;
    }

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
