<?xml version="1.0" encoding="UTF-8"?>
<!--
  OrcheStack favicon — matches the dashboard's .brand-mark CSS:
    32 x 32 navy (#0f2a44) rounded square with a white "O" centered.
  Vector format so it scales cleanly to whatever size the browser asks for
  (tab icon ~16px, bookmarks ~24px, retina ~32-64px).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" ry="8" fill="#0f2a44"/>
  <text x="16" y="22"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-weight="800"
        font-size="20"
        text-anchor="middle"
        fill="#ffffff">O</text>
</svg>
