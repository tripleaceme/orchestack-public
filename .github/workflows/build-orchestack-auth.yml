# Build and push the orchestack-auth image to Docker Hub.
#
# Triggered by pushes to main that change anything under system/auth/ (the
# source folder for this image) or assets/css/ (the shared CSS the image
# ships from the repo root), or by manual workflow_dispatch.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME  — your Docker Hub account name (tripleaceme)
#   - DOCKERHUB_TOKEN     — a personal access token from
#                            hub.docker.com/settings/security (NOT your password)
#
# The image is built for both linux/amd64 (the dominant VPS architecture) and
# linux/arm64 (so it runs on Apple Silicon dev machines and ARM VPSes like
# Hetzner CAX, AWS Graviton, etc.) using QEMU emulation under the hood.

name: Build and push orchestack-auth

on:
  push:
    branches: [main]
    paths:
      - 'system/auth/**'
      - 'assets/css/**'
      - '.github/workflows/build-orchestack-auth.yml'
  workflow_dispatch:  # also allow manual triggering from the Actions tab

env:
  # GitHub Actions deprecated Node 20 actions on 2026-06-16 and removes the
  # runtime on 2026-09-16. This env var opts every JavaScript action in this
  # workflow into Node 24 without requiring us to bump every action's major
  # version. Bumping the actions individually (actions/checkout@v5,
  # docker/build-push-action@v6, etc.) is the long-term fix; this is the
  # belt-and-suspenders bridge until those bumps happen.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch build support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for tagging
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tripleaceme/orchestack-auth
          # Tags produced:
          #   - latest (always on every push to main)
          #   - 0.1-rev{git short SHA} (immutable per-commit tag)
          #   - 0.1.0 (semver — bumped manually in this file when releasing)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=0.1.0,enable={{is_default_branch}}
            type=sha,prefix=0.1-rev,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          # Build context is the OrcheStack repo root, NOT system/auth/ — the
          # Dockerfile pulls in the shared assets/css/ which lives at the
          # root. See system/auth/Dockerfile for the explanation.
          context: .
          file: ./system/auth/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions' built-in cache so subsequent builds are fast
          # when only docs/CSS change but the Dockerfile is stable.
          cache-from: type=gha
          cache-to: type=gha,mode=max
