# Bundle the OrcheStack runtime artefacts into a tarball and attach it to a
# GitHub Release whenever a `v*.*.*` tag is pushed.
#
# What this produces
# ------------------
# A single file: orchestack-runtime-${VERSION}.tar.gz (~30 KB)
# Plus its SHA256 checksum: orchestack-runtime-${VERSION}.tar.gz.sha256
#
# What's inside the tarball
# -------------------------
# Only the files an OPERATOR needs to run OrcheStack. Source code, Dockerfiles,
# website HTML, docs, generators — none of that goes in. Those are build
# inputs, not runtime inputs.
#
#   orchestack-runtime-${VERSION}/
#     docker-compose.yml         (5-service control plane)
#     .env.example               (operator copies to .env, sets ORCHESTACK_DB_PASSWORD)
#     traefik/traefik.yml        (mounted into the proxy container)
#     traefik/dynamic/.gitkeep   (placeholder for future dynamic config)
#     postgres-init/00-init.sql       (creates the platform schema)
#     postgres-init/10-platform-schema.sql (creates the 10 platform tables)
#     services/*.yml             (per-tool compose snippets for M2.3+ services)
#     INSTALL.md                 (one-page install instructions)
#     VERSION                    (the tag this bundle was built from)
#
# Tagging convention
# ------------------
# Push a tag matching v[0-9]+.[0-9]+.[0-9]+ from main:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The workflow runs, the release appears at
# https://github.com/tripleaceme/orchestack-public/releases/tag/v0.1.0 with
# the tarball attached. The `latest` redirect at
# https://github.com/.../releases/latest/download/orchestack-runtime.tar.gz
# always points to the most recent published release — which is what
# install.sh downloads.
#
# Two jobs run on every tag push:
#   - bundle:          assembles the operator runtime tarball and uploads it
#                      to the GitHub Release
#   - docker-publish:  builds the four OrcheStack-owned images and pushes
#                      them to Docker Hub, each tagged with both :latest
#                      and the semantic version

name: Release runtime bundle

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # v0.1.0, v1.2.3 — but NOT v0.1.0-rc1 or arbitrary tags
  workflow_dispatch:               # also allow manual triggering for testing

env:
  # Opt every JavaScript action into Node 24 ahead of the 2026-09-16 forced
  # cutoff. See the auth-build workflow for the longer explanation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the GitHub Release + upload assets

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          # For tag pushes: github.ref is "refs/tags/v0.1.0" → strip prefix.
          # For workflow_dispatch: no tag, use "dev-${SHA}" so the build still
          # produces a tarball but doesn't collide with a real release.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-${GITHUB_SHA:0:7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building bundle for version: ${VERSION}"

      - name: Assemble the bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          BUNDLE="orchestack-runtime-${VERSION}"
          mkdir -p "${BUNDLE}/traefik/dynamic" "${BUNDLE}/postgres-init" \
                   "${BUNDLE}/services"

          # Copy the runtime files. Source: system/docker/ in this repo.
          cp system/docker/docker-compose.yml          "${BUNDLE}/docker-compose.yml"
          cp system/docker/.env.example                "${BUNDLE}/.env.example"
          cp system/docker/traefik/traefik.yml         "${BUNDLE}/traefik/traefik.yml"
          # The dynamic/ folder needs a placeholder so it survives tar+extract.
          touch                                        "${BUNDLE}/traefik/dynamic/.gitkeep"
          cp system/docker/postgres-init/*.sql         "${BUNDLE}/postgres-init/"
          # Per-service compose snippets — added in M2.3. One YAML file per
          # managed cold/hot-tier tool. Mounted read-only by the orchestrator.
          cp system/docker/services/*.yml              "${BUNDLE}/services/"

          # Embed the version so the operator can run `cat VERSION` to know
          # what they extracted.
          echo "${VERSION}" > "${BUNDLE}/VERSION"

          # Inline install instructions (no network round-trip needed).
          cat > "${BUNDLE}/INSTALL.md" <<EOF
          # Install OrcheStack ${VERSION}

          You have the runtime bundle. To bring up the control plane:

          \`\`\`sh
          cp .env.example .env
          \$EDITOR .env                  # set ORCHESTACK_DB_PASSWORD
          docker compose up -d
          \`\`\`

          Then visit http://localhost — you should land on the signup page.

          ## What this bundle contains

          Just the runtime files. \`docker compose up\` pulls the actual
          service images (auth, postgres, traefik, etc.) from Docker Hub
          on first run.

          - \`docker-compose.yml\` — 5-service control plane
          - \`.env.example\` — template; you'll fill in the OrcheStack DB password
          - \`traefik/\` — reverse-proxy configuration
          - \`postgres-init/\` — SQL run on first PostgreSQL boot
          - \`services/\` — per-tool compose snippets (M2.3+)

          ## What's NOT in this bundle

          Source code, Dockerfiles, HTML for the auth UI, documentation site.
          Those are build inputs that live in the GitHub repository at
          https://github.com/tripleaceme/orchestack-public — clone the repo
          only if you want to contribute, fork, or rebuild the images
          yourself.

          ## Updating

          Download the next release tarball and overwrite the files —
          \`docker compose pull && docker compose up -d\` picks up new images.
          Keep your \`.env\` file; never overwrite it during an update.

          ## Documentation

          Full docs at https://orchestack.africa/docs/
          EOF

          # Make the tarball. Reproducibility hardening: --sort=name + fixed
          # mtime so two builds of the same source produce identical bytes.
          tar --sort=name \
              --mtime="2026-01-01 00:00:00 UTC" \
              --owner=0 --group=0 --numeric-owner \
              -czf "${BUNDLE}.tar.gz" "${BUNDLE}"

          # Checksum for operators who want to verify integrity offline.
          sha256sum "${BUNDLE}.tar.gz" > "${BUNDLE}.tar.gz.sha256"

          # Unversioned aliases — same bytes, stable filenames. Required for
          # the /releases/latest/download/<name> redirect to work: GitHub
          # matches by exact filename, so we need an asset literally called
          # `orchestack-runtime.tar.gz` (no version embedded) for installers
          # to use the "latest" URL. The versioned name above stays as the
          # permanent archive entry for anyone pinning to a specific release.
          cp "${BUNDLE}.tar.gz"        "orchestack-runtime.tar.gz"
          cp "${BUNDLE}.tar.gz.sha256" "orchestack-runtime.tar.gz.sha256"
          # Rewrite the checksum line so it references the unversioned name
          # — otherwise `sha256sum -c` would look for the versioned file.
          sed -i "s| ${BUNDLE}.tar.gz| orchestack-runtime.tar.gz|" "orchestack-runtime.tar.gz.sha256"

          echo "=== Bundle contents ==="
          tar -tzf "${BUNDLE}.tar.gz"
          echo "=== Files to upload ==="
          ls -lh *.tar.gz *.sha256

      - name: Upload bundle to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          BUNDLE="orchestack-runtime-${VERSION}"

          # Create the release if it doesn't exist (e.g. tag pushed without
          # using `gh release create` first), then upload the bundle + checksum.
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "OrcheStack ${TAG}" \
              --notes "Runtime bundle for OrcheStack ${TAG}. Install with the [installer script](https://orchestack.africa/install.sh) or by downloading and extracting the tarball below."
          fi

          gh release upload "${TAG}" \
            "${BUNDLE}.tar.gz" \
            "${BUNDLE}.tar.gz.sha256" \
            "orchestack-runtime.tar.gz" \
            "orchestack-runtime.tar.gz.sha256" \
            --clobber

      - name: Upload as workflow artifact (for workflow_dispatch testing)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: orchestack-runtime-${{ steps.ver.outputs.version }}
          path: |
            orchestack-runtime-*.tar.gz
            orchestack-runtime-*.tar.gz.sha256
          retention-days: 7

  docker-publish:
    name: Publish ${{ matrix.image }} to Docker Hub
    # Only push images on real tag pushes — workflow_dispatch runs build the
    # bundle (above) for testing but do not publish to Docker Hub.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false   # let every image attempt to build even if one fails
      matrix:
        include:
          - image: orchestack-auth
            context: .
            dockerfile: system/auth/Dockerfile
          - image: orchestack-orchestrator
            context: system/orchestrator
            dockerfile: system/orchestrator/Dockerfile
          - image: orchestack-dashboard
            context: system/dashboard
            dockerfile: system/dashboard/Dockerfile
          - image: orchestack-ge
            context: system/docker/ge-image
            dockerfile: system/docker/ge-image/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags + OCI labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tripleaceme/${{ matrix.image }}
          # Tag with both the semantic version (v0.3.0 → 0.3.0) and the
          # rolling :latest. `latest` is intentionally bumped on every
          # tagged release so `docker compose pull` upgrades operators.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          # Build-time OCI labels — augment the static labels baked into
          # each Dockerfile with the per-build revision + version + created.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.image }}
          cache-to: type=gha,scope=release-${{ matrix.image }},mode=max
