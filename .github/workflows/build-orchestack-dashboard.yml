# Build and push the orchestack-dashboard image to Docker Hub.
#
# Triggered by pushes to main that change anything under system/dashboard/,
# or by manual workflow_dispatch.
#
# Required GitHub Secrets (same as the other build workflows):
#   - DOCKERHUB_USERNAME — tripleaceme
#   - DOCKERHUB_TOKEN    — personal access token
#
# Multi-arch build (linux/amd64 + linux/arm64) for parity with the auth
# and orchestrator images.

name: Build and push orchestack-dashboard

on:
  push:
    branches: [main]
    paths:
      - 'system/dashboard/**'
      - '.github/workflows/build-orchestack-dashboard.yml'
  workflow_dispatch:

env:
  # Opt every JS action into Node 24 ahead of the 2026-09-16 forced cutoff.
  # See the auth-build workflow for the explanation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Smoke test BEFORE the multi-arch build. Same lesson the orchestrator
      # workflow learned the hard way: import-time errors in route
      # registration or Pydantic models are caught here in ~30 seconds
      # instead of via a test-PC restart loop. Cheap insurance.
      - name: Smoke test — import the FastAPI app
        run: |
          python3 -m venv /tmp/smoke
          /tmp/smoke/bin/pip install -q -r system/dashboard/requirements.txt
          /tmp/smoke/bin/python -c "
          import sys; sys.path.insert(0, 'system/dashboard')
          from app.main import app
          assert len(app.routes) >= 3, f'Expected at least 3 routes, found {len(app.routes)}'
          print(f'SMOKE TEST OK: {len(app.routes)} routes registered')
          "

      - name: Set up QEMU (multi-arch build support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for tagging
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tripleaceme/orchestack-dashboard
          # Tag pattern matches the auth + orchestrator images:
          #   latest  on every main push
          #   0.1.0   semver (bumped manually here when releasing)
          #   0.1-rev{sha} immutable per-commit tag
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=0.1.0,enable={{is_default_branch}}
            type=sha,prefix=0.1-rev,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          # Narrower context — dashboard has no shared assets, unlike auth.
          context: ./system/dashboard
          file: ./system/dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject the commit SHA into the image so the dashboard footer
          # can show "dashboard <8-char-sha>" instead of "dev." Without
          # this, operators can't tell from the UI whether they're on
          # latest or an older pulled-but-stale image.
          build-args: |
            DASHBOARD_BUILD_SHA=${{ github.sha }}
          # GHA cache scoped per-image so auth/orchestrator/dashboard don't
          # evict each other's working sets.
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
